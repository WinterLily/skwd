# Matugen template configuration: maps input templates to output paths for all themed apps
# NOTE: This file is generated by the setup script. Edit config.toml.in instead.
[config]
reload_apps = false

# Quickshell MD3 color palette — dark and light variants pre-generated
[templates.skwd-dark]
input_path = "@SKWD_INSTALL@/ext/matugen/templates/quickshell-colors-dark.json"
output_path = "~/.cache/skwd/colors-dark.json"

[templates.skwd-light]
input_path = "@SKWD_INSTALL@/ext/matugen/templates/quickshell-colors-light.json"
output_path = "~/.cache/skwd/colors-light.json"

# Niri focus-ring primary color
[templates.niri-primary]
input_path = "@SKWD_INSTALL@/ext/matugen/templates/niri-colors.kdl"
output_path = "~/.cache/skwd/niri-primary-color"

# App-specific theme templates
[templates.kitty]
input_path = "@SKWD_INSTALL@/ext/matugen/templates/kitty.conf"
output_path = "~/.config/kitty/skwd-theme.conf"

[templates.kde]
input_path = "@SKWD_INSTALL@/ext/matugen/templates/kde-colors.colors"
output_path = "~/.local/share/color-schemes/SkwdMatugen.colors"

[templates.vscode]
input_path = "@SKWD_INSTALL@/ext/matugen/templates/vscode-theme.json"
output_path = "~/.vscode/extensions/matugen.matugen-theme-1.0.0/themes/matugen-color-theme.json"

[templates.vesktop]
input_path = "@SKWD_INSTALL@/ext/matugen/templates/vesktop.css"
output_path = "~/.config/vesktop/themes/kitty-match.css"

[templates.zen]
input_path = "@SKWD_INSTALL@/ext/matugen/templates/zen.css"
output_path = "~/.zen/n7jmvslb.Default (release)/chrome/userChrome.css"

[templates.spicetify]
input_path = "@SKWD_INSTALL@/ext/matugen/templates/spicetify.ini"
output_path = "~/.config/spicetify/Themes/Matugen/color.ini"

[templates.yazi]
input_path = "@SKWD_INSTALL@/ext/matugen/templates/yazi-theme.toml"
output_path = "~/.config/yazi/theme.toml"

[templates.spicetify-css]
input_path = "@SKWD_INSTALL@/ext/matugen/templates/spicetify.css"
output_path = "~/.config/spicetify/Themes/Matugen/user.css"

[templates.qt6ct]
input_path = "@SKWD_INSTALL@/ext/matugen/templates/qt6ct-colors.conf"
output_path = "~/.config/qt6ct/colors/matugen.conf"
